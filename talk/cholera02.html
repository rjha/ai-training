<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>John Snow's Cholera Investigation</title>

    <style>
        body {
            margin: 0;
            background: #f5f5f5;
            font-family: Arial, Helvetica, sans-serif;
        }

        #toolbar {
            background: #222;
            color: white;
            padding: 12px;
        }

        button {
            padding: 8px 16px;
            margin-right: 10px;
            font-size: 15px;
            cursor: pointer;
        }

        #map {
            width: 1000px;
            height: 700px;
            background: white;
            margin: 20px auto;
            display: block;
            border: 1px solid #bbb;
        }

        .street {
            stroke: #777;
            stroke-width: 6;
        }

        .label {
            font-size: 18px;
            fill: #666;
        }

        .death {
            fill: #111;
            opacity: 0;
            transition: opacity .5s;

        }

        .pump {
            fill: #0d6efd;
            opacity: 0;
        }

        .heat {
            fill: orange;
            opacity: 0;
        }

        #story {
            width: 1000px;
            margin: auto;
            font-size: 20px;
            text-align: center;
            padding: 10px;
        }
    </style>

</head>

<body>

    <div id="toolbar">

        <button onclick="showLocation()">Death Locations</button>
        <button onclick="showPump()">Reveal</button>
        <button onclick="showHeat()">Heat Map</button>
        <button onclick="resetMap()">Reset</button>

    </div>

    <div id="story">

        <b>London, 1854</b><br>
        Hundreds of people are dying.<br>
        Can you discover why?

    </div>

    <svg id="map" viewBox="0 0 1000 700">

        <!-- Roads -->

        <line class="street" x1="120" y1="120" x2="900" y2="120" />
        <line class="street" x1="120" y1="300" x2="900" y2="300" />
        <line class="street" x1="120" y1="500" x2="900" y2="500" />

        <line class="street" x1="300" y1="60" x2="300" y2="620" />
        <line class="street" x1="550" y1="60" x2="550" y2="620" />
        <line class="street" x1="760" y1="60" x2="760" y2="620" />

        <text class="label" x="360" y="105">Broad Street</text>
        <text class="label" x="130" y="285">Cambridge Street</text>
        <text class="label" x="130" y="485">Poland Street</text>

        <!-- Heat -->
        
        <circle id="heat" cx="560" cy="310" r="150" class="heat"/>

        <!-- Pump -->

        <!-- Water Sources -->

        <g id="watersources" style="opacity:0">

            <!-- Broad Street Pump -->
            <g>
                <circle cx="560" cy="310" r="12" fill="#2196F3" />
                <rect x="555" y="270" width="10" height="40" fill="#2196F3" />
                <rect x="548" y="265" width="24" height="8" fill="#2196F3" />
                <text x="535" y="250" font-size="16" fill="#1565C0">
                    Broad St Pump
                </text>
            </g>

            <!-- Workhouse Well -->
            <g>

                <circle cx="230" cy="520" r="12" fill="#2196F3" />
                <rect x="225" y="480" width="10" height="40" fill="#2196F3" />
                <rect x="218" y="475" width="24" height="8" fill="#2196F3" />
                <text x="120" y="555" font-size="16" fill="#1565C0">
                    Workhouse Well
                </text>

            </g>

            <!-- Brewery -->

            <g>
                <rect x="790" y="470" width="35" height="35" fill="#8D6E63" />
                <text x="760" y="525" font-size="16" fill="#6D4C41">
                    Brewery
                </text>

            </g>

        </g>

        <!-- Deaths -->

        <g id="deaths"></g>

    </svg>

    <script>

        const deaths = [

            { x: 500, y: 240, d: 1 },
            { x: 525, y: 255, d: 1 },
            { x: 560, y: 245, d: 1 },

            { x: 590, y: 270, d: 2 },
            { x: 610, y: 295, d: 2 },
            { x: 540, y: 305, d: 2 },

            { x: 500, y: 320, d: 3 },
            { x: 525, y: 345, d: 3 },
            { x: 565, y: 340, d: 3 },
            { x: 610, y: 330, d: 3 },

            { x: 470, y: 285, d: 4 },
            { x: 475, y: 340, d: 4 },
            { x: 640, y: 300, d: 4 },
            { x: 650, y: 260, d: 4 },

            { x: 510, y: 220, d: 5 },
            { x: 590, y: 220, d: 5 },
            { x: 480, y: 390, d: 5 },
            { x: 610, y: 390, d: 5 },

            { x: 450, y: 260, d: 6 },
            { x: 450, y: 340, d: 6 },
            { x: 680, y: 260, d: 6 },
            { x: 680, y: 340, d: 6 }

        ];

        const svg = document.getElementById("deaths");

        deaths.forEach((p, i) => {

            let c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            c.setAttribute("cx", p.x);
            c.setAttribute("cy", p.y);
            c.setAttribute("r", 5);
            c.setAttribute("class", "death");
            c.dataset.day = p.d;
            svg.appendChild(c);

        });

        let currentDay = 0;
        let deathCount = 0;

        function showLocation() {

            if (currentDay >= 6) {
                // @todo ask to show water sources
                return;
            };

            currentDay++;
            document.querySelectorAll(".death").forEach(d => {
                if (Number(d.dataset.day) <= currentDay) {
                    d.style.opacity = 1;
                    deathCount = deathCount + 1;
                }

               
            });

            document.getElementById("story").innerHTML =
                "<b>Day " + currentDay + "</b><br>" +
                "Total deaths: " + deathCount + " <br>" +
                "What pattern do you notice?";

        }

        function showPump() {

            document.getElementById("watersources").style.opacity = 1;
            document.getElementById("story").innerHTML =

                "<b>Three water sources are available.</b><br>" +
                "Which one best explains the outbreak?";

        }

        function showHeat() {

            document.getElementById("heat").style.opacity = .25;
            document.getElementById("story").innerHTML =
                "<b>Deaths cluster around the Broad Street pump.</b><br>" +
                "John Snow concluded that contaminated water <br> " + 
                " not bad air, was spreading cholera.";

        }

        function resetMap() {

            currentDay = 0;
            document.querySelectorAll(".death").forEach(d => {
                d.style.opacity = 0;
            });

            deathCount = 0;
            document.getElementById("watersources").style.opacity = 0;
            document.getElementById("heat").style.opacity = 0;
            document.getElementById("story").innerHTML =

                "<b>London, 1854</b><br>" +
                "Hundreds of people are dying.<br>" +
                "Can you discover why?";

        }

    </script>

</body>

</html>
