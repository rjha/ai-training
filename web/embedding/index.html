<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Cross-Lingual Word Space</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; background: #fcfcfc; margin: 0; padding: 20px; }
        h1 { margin-bottom: 5px; color: #333; }
        p { color: #666; margin-bottom: 20px; }
        #canvasContainer { position: relative; display: inline-block; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-radius: 12px; background: white; border: 1px solid #eee; overflow: hidden; }
        canvas { display: block; border-radius: 12px; cursor: grab; }
        canvas:active { cursor: grabbing; }
        .legend { display: flex; justify-content: center; gap: 20px; margin-top: 15px; font-weight: bold; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid #333; }
        .controls-hint { font-size: 12px; color: #999; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>The "Wow" Factor: Multi-Lingual Semantic Space</h1>
    <p>Scroll your mouse wheel to <b>Zoom</b>. Click and drag to <b>Pan</b>. Hover over points to inspect.</p>

    <div id="canvasContainer">
        <!-- Kept at a clean, readable default display size -->
        <canvas id="spaceCanvas" width="900" height="650"></canvas>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background: #FF9933;"></div> Hindi Tiles</div>
        <div class="legend-item"><div class="dot" style="background: #138808;"></div> English Tiles</div>
    </div>
    <div class="controls-hint">Tip: If you zoom out too far, drag back to center.</div>

    <script src="embedding.js"></script>
    <script>
        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');
        
        // --- PAN & ZOOM STATE VARIABLES ---
        let scale = 1.0;
        let panX = 0;
        let panY = 0;
        let isDragging = false;
        let startX, startY;
        let hoveredIndex = null;

        // Base padding inside the virtual coordinate space
        const padding = 150; 

        // 1. Math boundaries setup
        const xValues = embeddingData.map(d => d.x);
        const yValues = embeddingData.map(d => d.y);
        const minX = Math.min(...xValues), maxX = Math.max(...xValues);
        const minY = Math.min(...yValues), maxY = Math.max(...yValues);

        // Map raw vectors directly to the canvas base pixel coordinate system
        function mapToScreen(x, y) {
            const screenX = padding + ((x - minX) / (maxX - minX)) * (canvas.width - padding * 2);
            const screenY = canvas.height - padding - ((y - minY) / (maxY - minY)) * (canvas.height - padding * 2);
            return { x: screenX, y: screenY };
        }

        // Initialize spatial configurations
        embeddingData.forEach((d, idx) => {
            const pos = mapToScreen(d.x, d.y);
            d.screenX = pos.x;
            d.screenY = pos.y;
            d.labelX = pos.x;
            d.labelY = pos.y - 15;
        });

        // 2. ANTI-COLLISION ENGINE
        function relaxLabels() {
            const iterations = 100;
            const minSpacingX = 75; 
            const minSpacingY = 24; 

            for (let i = 0; i < iterations; i++) {
                for (let j = 0; j < embeddingData.length; j++) {
                    for (let k = j + 1; k < embeddingData.length; k++) {
                        let labelA = embeddingData[j];
                        let labelB = embeddingData[k];

                        let deltaX = labelA.labelX - labelB.labelX;
                        let deltaY = labelA.labelY - labelB.labelY;
                        let absX = Math.abs(deltaX);
                        let absY = Math.abs(deltaY);

                        if (absX < minSpacingX && absY < minSpacingY) {
                            let pushX = (minSpacingX - absX) * 0.2;
                            let pushY = (minSpacingY - absY) * 0.2;

                            if (deltaX > 0) { labelA.labelX += pushX; labelB.labelX -= pushX; }
                            else { labelA.labelX -= pushX; labelB.labelX += pushX; }

                            if (deltaY > 0) { labelA.labelY += pushY; labelB.labelY -= pushY; }
                            else { labelA.labelY -= pushY; labelB.labelY += pushY; }
                        }
                    }
                }
            }
        }
        relaxLabels();

        // Helper to convert screen mouse clicks into virtual transformed space coordinates
        function getVirtualMousePos(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const canvasX = clientX - rect.left;
            const canvasY = clientY - rect.top;
            
            // Reverse engineering the pan and zoom transform matrix
            const virtualX = (canvasX - panX) / scale;
            const virtualY = (canvasY - panY) / scale;
            return { x: virtualX, y: virtualY };
        }

        // 3. MAIN DRAW ENGINE WITH VIEWPORT MATRIX TRANSFORMS
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            // Apply Viewport Camera matrix offsets
            ctx.translate(panX, panY);
            ctx.scale(scale, scale);

            // Infinite Subtle background grid (scaled with pan coordinate)
            ctx.strokeStyle = '#f4f4f4';
            ctx.lineWidth = 1 / scale; // Keep grid lines ultra-crisp when zooming
            const gridSize = 100;
            const startGridX = Math.floor(-panX / scale / gridSize) * gridSize - gridSize;
            const endGridX = startGridX + (canvas.width / scale) + gridSize * 2;
            const startGridY = Math.floor(-panY / scale / gridSize) * gridSize - gridSize;
            const endGridY = startGridY + (canvas.height / scale) + gridSize * 2;

            for (let x = startGridX; x <= endGridX; x += gridSize) {
                ctx.beginPath(); ctx.moveTo(x, startGridY); ctx.lineTo(x, endGridY); ctx.stroke();
            }
            for (let y = startGridY; y <= endGridY; y += gridSize) {
                ctx.beginPath(); ctx.moveTo(startGridX, y); ctx.lineTo(endGridX, y); ctx.stroke();
            }

            // Draw words and subtle layout anchors
            embeddingData.forEach((d, idx) => {
                const isHovered = (idx === hoveredIndex);
                
                const labelMovedDist = Math.hypot(d.labelX - d.screenX, d.labelY - (d.screenY - 15));
                if (labelMovedDist > 5) {
                    ctx.strokeStyle = 'rgba(150,150,150,0.3)';
                    ctx.lineWidth = 0.8 / scale;
                    ctx.beginPath(); ctx.moveTo(d.screenX, d.screenY); ctx.lineTo(d.labelX, d.labelY + 5); ctx.stroke();
                }

                ctx.fillStyle = isHovered ? '#000' : '#444';
                // Adjust typography resolution dynamically based on current zoom factor scale
                const fontSize = isHovered ? 15 : 13;
                ctx.font = `${isHovered ? 'bold ' : ''}${fontSize}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.fillText(d.word, d.labelX, d.labelY);
            });

            // Draw actual coordinate point nodes over text
            embeddingData.forEach((d, idx) => {
                const isHovered = (idx === hoveredIndex);
                ctx.fillStyle = d.language === 'hindi' ? '#FF9933' : '#138808';
                ctx.beginPath();
                // Radius adjusts to hover
                ctx.arc(d.screenX, d.screenY, (isHovered ? 9 : 6), 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1.5 / scale;
                ctx.stroke();
            });

            ctx.restore();
        }

        // 4. INTERACTION LISTENERS FOR PANNING AND MOUSE TRACKING
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX - panX;
            startY = e.clientY - panY;
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                // Adjust viewport offset
                panX = e.clientX - startX;
                panY = e.clientY - startY;
                draw();
                return;
            }

            // Compute target lookup over current transformed space metrics
            const vMouse = getVirtualMousePos(e.clientX, e.clientY);
            let foundIndex = null;
            
            for (let i = 0; i < embeddingData.length; i++) {
                const d = embeddingData[i];
                const distToDot = Math.hypot(d.screenX - vMouse.x, d.screenY - vMouse.y);
                const distToText = Math.hypot(d.labelX - vMouse.x, d.labelY - vMouse.y);
                
                // Keep target detection scaling responsive
                if (distToDot < 18 || distToText < 15) { 
                    foundIndex = i; 
                    break; 
                }
            }
            
            if (foundIndex !== hoveredIndex) {
                hoveredIndex = foundIndex;
                draw();
            }
        });

        // 5. INTERACTIVE SCROLL WHEEL ZOOM MAPPING
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault(); // Stop entire browser page scrolling down
            
            const zoomIntensity = 0.1;
            const mousePosBeforeZoom = getVirtualMousePos(e.clientX, e.clientY);

            // Compute new scale tracking boundaries
            if (e.deltaY < 0) {
                scale = Math.min(scale * (1 + zoomIntensity), 5.0); // Maximum 5x close zoom
            } else {
                scale = Math.max(scale * (1 - zoomIntensity), 0.3); // Minimum 0.3x wide out view
            }
            // Shift pan coordinates so the zoom pivots exactly on your mouse cursor position
            const mousePosAfterZoom = getVirtualMousePos(e.clientX, e.clientY);
            panX += (mousePosAfterZoom.x - mousePosBeforeZoom.x) * scale;
            panY += (mousePosAfterZoom.y - mousePosBeforeZoom.y) * scale;draw();
        }, 
        { 
            passive: false 
        }); // Bootstrap rendering loop
        
        draw();

    </script>
</body>
</html>
