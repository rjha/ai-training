<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Cross-Lingual Word Space</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; background: #fcfcfc; margin: 0; padding: 20px; }
        h1 { margin-bottom: 5px; color: #333; }
        p { color: #666; margin-bottom: 20px; }
        #canvasContainer { position: relative; display: inline-block; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-radius: 12px; background: white; border: 1px solid #eee; }
        canvas { display: block; border-radius: 12px; cursor: crosshair; }
        .legend { display: flex; justify-content: center; gap: 20px; margin-top: 15px; font-weight: bold; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid #333; }
    </style>
</head>
<body>

    <h1>The "Wow" Factor: Multi-Lingual Semantic Space</h1>
    <p>Hover anywhere. Watch how the AI independently clusters words by meaning across alphabets.</p>

    <div id="canvasContainer">
        <canvas id="spaceCanvas" width="900" height="650"></canvas>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background: #FF9933;"></div> Hindi Tiles</div>
        <div class="legend-item"><div class="dot" style="background: #138808;"></div> English Tiles</div>
    </div>

    <!-- Load the data generated by Python -->
    <script src="embedding.js"></script>
    <script>
        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');
        const padding = 100;
        let hoveredIndex = null;

        // 1. Math boundaries setup
        const xValues = embeddingData.map(d => d.x);
        const yValues = embeddingData.map(d => d.y);
        const minX = Math.min(...xValues), maxX = Math.max(...xValues);
        const minY = Math.min(...yValues), maxY = Math.max(...yValues);

        function mapToScreen(x, y) {
            const screenX = padding + ((x - minX) / (maxX - minX)) * (canvas.width - padding * 2);
            const screenY = canvas.height - padding - ((y - minY) / (maxY - minY)) * (canvas.height - padding * 2);
            return { x: screenX, y: screenY };
        }

        // Map the baseline dot points to the screen first
        embeddingData.forEach((d, idx) => {
            const pos = mapToScreen(d.x, d.y);
            d.screenX = pos.x;
            d.screenY = pos.y;
            // Set initial label positions right above the dots
            d.labelX = pos.x;
            d.labelY = pos.y - 15;
        });

        // 2. ANTI-COLLISION / TEXT RELAXATION ENGINE
        // Iteratively forces overlapping text boundaries to repel each other
        function relaxLabels() {
            const iterations = 100;
            const minSpacingX = 65; // Minimum horizontal distance between text centers
            const minSpacingY = 22; // Minimum vertical distance between text lines

            for (let i = 0; i < iterations; i++) {
                for (let j = 0; j < embeddingData.length; j++) {
                    for (let k = j + 1; k < embeddingData.length; k++) {
                        let labelA = embeddingData[j];
                        let labelB = embeddingData[k];

                        let deltaX = labelA.labelX - labelB.labelX;
                        let deltaY = labelA.labelY - labelB.labelY;
                        let absX = Math.abs(deltaX);
                        let absY = Math.abs(deltaY);

                        // If text labels overlap, calculate push force vectors
                        if (absX < minSpacingX && absY < minSpacingY) {
                            let pushX = (minSpacingX - absX) * 0.2;
                            let pushY = (minSpacingY - absY) * 0.2;

                            // Push apart horizontally
                            if (deltaX > 0) { labelA.labelX += pushX; labelB.labelX -= pushX; }
                            else { labelA.labelX -= pushX; labelB.labelX += pushX; }

                            // Push apart vertically
                            if (deltaY > 0) { labelA.labelY += pushY; labelB.labelY -= pushY; }
                            else { labelA.labelY -= pushY; labelB.labelY += pushY; }
                        }
                    }
                }
            }
        }

        // Run the text layout calculation once before rendering
        relaxLabels();

        // 3. MAIN DRAW ENGINE
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Subtle background grid
            ctx.strokeStyle = '#f4f4f4';
            ctx.lineWidth = 1;
            for(let i = 1; i < 6; i++) {
                ctx.beginPath(); ctx.moveTo((canvas.width/6)*i, 0); ctx.lineTo((canvas.width/6)*i, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, (canvas.height/6)*i); ctx.lineTo(canvas.width, (canvas.height/6)*i); ctx.stroke();
            }

            // A. Draw relational similarity background lines on hover
            if (hoveredIndex !== null) {
                const target = embeddingData[hoveredIndex];
                embeddingData.forEach((d, idx) => {
                    if (d.language !== target.language) {
                        // Faint distance tracker link
                        ctx.strokeStyle = 'rgba(0,0,0,0.03)';
                        ctx.lineWidth = 1;
                        ctx.beginPath(); ctx.moveTo(target.screenX, target.screenY); ctx.lineTo(d.screenX, d.screenY); ctx.stroke();
                    }
                });
            }

            // B. Draw text labels and subtle leader lines
            embeddingData.forEach((d, idx) => {
                const isHovered = (idx === hoveredIndex);
                
                // Draw a tiny faint leader line connecting the text back to its dot if it was pushed far away
                const labelMovedDist = Math.hypot(d.labelX - d.screenX, d.labelY - (d.screenY - 15));
                if (labelMovedDist > 5) {
                    ctx.strokeStyle = 'rgba(150,150,150,0.4)';
                    ctx.lineWidth = 0.8;
                    ctx.beginPath();
                    ctx.moveTo(d.screenX, d.screenY);
                    ctx.lineTo(d.labelX, d.labelY + 5);
                    ctx.stroke();
                }

                // Output typography
                ctx.fillStyle = isHovered ? '#000' : '#444';
                ctx.font = isHovered ? 'bold 15px sans-serif' : '13px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(d.word, d.labelX, d.labelY);
            });

            // C. Draw the data points (Dots) over the lines
            embeddingData.forEach((d, idx) => {
                const isHovered = (idx === hoveredIndex);
                ctx.fillStyle = d.language === 'hindi' ? '#FF9933' : '#138808';
                ctx.beginPath();
                ctx.arc(d.screenX, d.screenY, isHovered ? 9 : 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1.5;
                ctx.stroke();
            });
        }

        // 4. INTERACTION LISTENER
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            let foundIndex = null;
            for (let i = 0; i < embeddingData.length; i++) {
                const d = embeddingData[i];
                // Calculate collision checking based on the relaxed text position or actual dot radius
                const distToDot = Math.hypot(d.screenX - mouseX, d.screenY - mouseY);
                const distToText = Math.hypot(d.labelX - mouseX, d.labelY - mouseY);
                
                if (distToDot < 15 || distToText < 15) { 
                    foundIndex = i; 
                    break; 
                }
            }
            
            if (foundIndex !== hoveredIndex) {
                hoveredIndex = foundIndex;
                draw();
            }
        });

        // Run layout
        draw();

    </script>
</body>
</html>
